steps:
  # Build the container image from repo root so the full package structure is available
  - name: 'gcr.io/cloud-builders/docker'
    dir: '.'
    args:
      - 'build'
      - '-f'
      - 'nexus/Dockerfile'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nexus-api'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nexus-api']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nexus-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nexus-api'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      # FIX: DEMO_MODE=false for live hackathon demo; set ALLOWED_ORIGINS to the
      # Cloud Run service URL once you have it (update before submitting).
      - >-
        DEMO_MODE=false,
        PORT=8080,
        ALLOWED_ORIGINS=https://nexus-api-HASH-as.a.run.app

images:
  - 'gcr.io/$PROJECT_ID/nexus-api'
